[railway]
name = "cert-prep-nextjs"
deployment_strategy = "duplicate"

[build]
builder = "NIXPACKS"
build_command = "npm install && npm run build"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environment]
NODE_ENV = "production"
