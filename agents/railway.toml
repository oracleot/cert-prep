[railway]
name = "cert-prep-agents"
deployment_strategy = "duplicate"

# Python/FastAPI service — agents LangGraph API
# python | fastapi | uvicorn
[build]
builder = "DOCKERFILE"
dockerfilePath = "agents/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environment]
PYTHONUNBUFFERED = "1"
